# Prometheus scrape config for the maritime platform.
# The four Spring Boot services run on the HOST (via `make run-*`), so we scrape
# them through host.docker.internal rather than compose service names.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: maritime-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels: { service: ingestion }
      - targets: ["host.docker.internal:8082"]
        labels: { service: streaming }
      - targets: ["host.docker.internal:8083"]
        labels: { service: storage }
      - targets: ["host.docker.internal:8084"]
        labels: { service: gateway }
