server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy simulator controls → maritime-ingestion (host :8081)
    # Must appear before the broader /api/v1 block
    location /api/v1/simulate {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Proxy all other API calls → maritime-api (host :8084)
    location /api/v1 {
        proxy_pass http://host.docker.internal:8084;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # SPA fallback — serve index.html for all unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
