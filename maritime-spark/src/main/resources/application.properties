spring.application.name=maritime-spark

# ── Spark ─────────────────────────────────────────────────────────────────────
# Master URL used when running locally (exec:java -Plocal or IDE).
# spark-submit overrides this via --master yarn|k8s://...|spark://...
spark.master=local[*]

# ── Job configuration ─────────────────────────────────────────────────────────
# All properties are overridable by environment variable via Spring's relaxed
# binding rules: SPARK_JOB_COLD_TIER_DIR → spark.job.cold-tier-dir

# Base directory of the Parquet cold tier written by maritime-storage.
spark.job.cold-tier-dir=./data/cold

# PostgreSQL target — override in production via env var or spark-submit --conf.
spark.job.db-url=jdbc:postgresql://localhost:5432/maritime
spark.job.db-user=postgres
spark.job.db-pass=postgres

# ISO-8601 date of the cold-tier partition to process.
# SpEL expression: defaults to yesterday so a scheduled daily job always
# processes the previous full day without an explicit parameter.
spark.job.batch-date=#{T(java.time.LocalDate).now().minusDays(1).toString()}
