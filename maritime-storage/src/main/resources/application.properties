server.port=8083
spring.kafka.consumer.group-id=storage-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
spring.kafka.consumer.properties.specific.avro.reader=true
# --- Hot tier: Postgres (replaces DynamoDB) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/maritime}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# Run schema.sql on startup to create vessel_risk (CREATE TABLE IF NOT EXISTS).
# Storage owns its own hot-tier table; streaming's Flyway owns zones + Spark tables.
spring.sql.init.mode=always

# --- Cold tier: Parquet on the local filesystem (replaces S3) ---
# Spark (maritime-spark) reads this same directory via COLD_TIER_DIR.
maritime.cold-tier.base-dir=${COLD_TIER_DIR:./data/cold}
# ── StorageKafkaProperties (@ConfigurationProperties prefix=maritime.storage.kafka) ──
# Single source of truth consumed by KafkaConsumerConfig.
maritime.storage.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
maritime.storage.kafka.schema-registry-url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
maritime.storage.kafka.group-id=storage-service

# --- Observability (Phase 4) ---
spring.application.name=storage-service
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
