server.port=8082
spring.kafka.consumer.group-id=streaming-service
spring.kafka.consumer.auto-offset-reset=earliest

# Consume raw VesselEvent as Avro; produce enriched events as Avro.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
spring.kafka.consumer.properties.specific.avro.reader=true

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.producer.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8085}

# Phase 6: PostGIS datasource (PostGIS container from docker-compose.yml)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/maritime
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: validate schema against Flyway migrations; never auto-create tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Suppress SQL echoing in production; set to 'true' during local debugging only.
spring.jpa.show-sql=false

# Flyway: apply V1__zones.sql automatically on startup.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Allow Flyway to baseline against an existing schema (tables created before Flyway ran).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── EnricherKafkaProperties (@ConfigurationProperties prefix=maritime.enricher.kafka) ──
# Single source of truth consumed by KafkaConsumerConfig.
# Fixes the H4 contradiction: the @Value default was "enricher-service" while
# spring.kafka.consumer.group-id below was "streaming-service".
# "streaming-service" is now authoritative in both places.
maritime.enricher.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
maritime.enricher.kafka.schema-registry-url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
maritime.enricher.kafka.group-id=streaming-service

# --- Observability (Phase 4) ---
spring.application.name=streaming-service
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Schema Registry URL for MaritimeTopology (Kafka Streams Avro Serde)
schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
