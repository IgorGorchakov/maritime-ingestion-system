name: CI

# Build + test every push and PR against main.
# Pinned to JDK 17 (the project's source/target level) so CI validates the
# same bytecode level we ship — not whatever newer JDK a contributor runs locally.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & verify (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven   # caches ~/.m2 keyed on pom.xml hashes

      - name: Build and verify
        run: ./mvnw -B verify
