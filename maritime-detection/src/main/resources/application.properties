server.port=8086
spring.application.name=detection-service

# Kafka bootstrap — overridden by KAFKA_BOOTSTRAP_SERVERS env var in production
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Schema Registry URL for AvroEnrichedEventSerdes (consumed by MaritimeTopology)
schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8085}

# RocksDB state directory for the Kafka Streams topology.
# Override with KAFKA_STREAMS_STATE_DIR to avoid collisions when running
# multiple instances on the same host.
kafka.streams.state-dir=${KAFKA_STREAMS_STATE_DIR:/tmp/kafka-streams/maritime}

# ── DetectionProperties (@ConfigurationProperties prefix=maritime.detection) ────
# Single source of truth consumed by MaritimeTopology and DetectionTopicConfig.
# The spring.kafka.* and schema.registry.url entries above remain for Spring
# Kafka auto-configuration; these mirror them under the typed prefix.
maritime.detection.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
maritime.detection.schema-registry-url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
maritime.detection.state-dir=${KAFKA_STREAMS_STATE_DIR:/tmp/kafka-streams/maritime}

# Actuator: expose health + prometheus scrape endpoint
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
