server.port=8081

# Avro on the wire: values are serialized as a 4-byte schema id + binary body.
# KafkaAvroSerializer auto-registers VesselEvent's schema with the registry on
# first produce and fails fast if the payload violates a registered schema.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.producer.properties.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8085}
# --- Observability (Phase 4) ---
spring.application.name=ingestion-service
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
