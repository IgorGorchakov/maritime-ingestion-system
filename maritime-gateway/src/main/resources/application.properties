server.port=8084

# Phase 7: PostGIS datasource for Spark batch rollup queries (read-only).
# The streaming service owns the schema/Flyway migrations; the gateway only reads.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/maritime
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# No JPA/Hibernate in the gateway — JdbcTemplate only.
# Suppress the Hibernate/JPA autoconfigure warning that fires when the JDBC
# starter is present but spring-boot-starter-data-jpa is absent.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# --- Observability (Phase 4) ---
spring.application.name=gateway-service
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
